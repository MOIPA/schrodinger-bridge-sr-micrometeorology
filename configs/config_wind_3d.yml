# Configuration for 3D Wind Field Super-Resolution
# 6 eta levels (ml0,1,2,3,5,10) x 3 components (U/V/W) = 18 output channels
# Condition variables: 10 surface variables
# UNet input = 18 (yt) + 10 (y_cond) = 28 channels
# UNet output = 18 channels
#
# 训练命令:
#   python scripts/train_schrodinger_bridge_model.py \
#     --config_path configs/config_wind_3d.yml \
#     --experiment_name ExperimentSchrodingerBridge3dWind \
#     --device cuda:0

