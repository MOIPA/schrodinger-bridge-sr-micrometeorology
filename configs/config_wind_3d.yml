  discarded_minute_range:
  - 1
  - 30
  dtype: float32
  hr_cropped_shape:
  - 192
  - 192
  hr_data_shape:
  - 192
  - 192
  # 条件变量（10个，不含lr风场 — lr由 __getitem__ 自动从 hr 名推导）
  input_variable_names:
  - t2
  - z
  - lu
  - tsk
  - swdown
  - glw
  - hfx
  - lh
  - psfc
  - pblh
  is_clipped: false
  max_clipped_value: null
  min_clipped_value: null
  missing_value: 0.0
  # 目标变量（18个 HR 风场）
  target_variable_names:
  - hr_u_ml0
  - hr_v_ml0
  - hr_w_ml0
  - hr_u_ml1
  - hr_v_ml1
  - hr_w_ml1
  - hr_u_ml2
  - hr_v_ml2
  - hr_w_ml2
  - hr_u_ml3
  - hr_v_ml3
  - hr_w_ml3
  - hr_u_ml5
  - hr_v_ml5
  - hr_w_ml5
  - hr_u_ml10
  - hr_v_ml10
  - hr_w_ml10
loader:
  batch_size: 2
  dl_data_ver: wrf_3d_v1
  num_workers: 4
  seed: 42
  train_valid_test_ratios:
  - 0.7
  - 0.145
  - 0.155
model:
  attn_res:
  - 16
  channel_mults:
  - 1
  - 2
  - 4
  - 8
  - 8
  channels_each_head: 16
  dropout: 0.2
  in_channel: 28    # 18 (yt: LR wind interpolated) + 10 (condition vars)
  inner_channel: 64  # 从32提升，增加容量
  max_period: 10.0
  out_channel: 18    # 6 levels x 3 components (u/v/w)
  res_blocks: 2      # 从1提升
  resblock_updown: true
si:
  eps: 0.2
  formula: quadratic
  loss_type: L2
  n_timestep: 10
train:
  early_stopping_patience: 400
  ema_decay: null
  epochs: 400
  learning_rate: 0.0005
  loss:
    loss_name: L2
  optim_name: AdamW
  save_interval: 100
  seed: 78268
  use_amp: false
